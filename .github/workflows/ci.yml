name: ci

on:
  push:
  pull_request:

jobs:
  dotnet:
    name: dotnet (xUnit + bUnit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Restore
        run: dotnet restore Heimdall.slnx

      - name: Build
        run: dotnet build Heimdall.slnx --no-restore --configuration Release

      - name: Test
        run: >-
          dotnet test Heimdall.slnx
          --no-build
          --configuration Release
          --settings coverlet.runsettings
          --logger "trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"

      # Merge the per-test-project cobertura files into a single Cobertura report.
      # `dotnet test` emits one coverage.cobertura.xml per test project, and each file
      # lists every assembly that was loaded — so non-target assemblies show up at 0%
      # in sibling reports. irongut/CodeCoverageSummary treats each file as an
      # independent report and naively averages, which double-counts and tanks the
      # overall percentage. ReportGenerator merges them into a single Cobertura file
      # whose totals correctly reflect the union of covered lines/branches.
      - name: Merge coverage reports (Cobertura)
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:'TestResults/**/coverage.cobertura.xml' \
            -targetdir:TestResults/merged \
            -reporttypes:Cobertura

      - name: Code Coverage Summary (enforce >=80%)
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: TestResults/merged/Cobertura.xml
          badge: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '80 80'
          fail_below_min: true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-coverage
          path: |
            TestResults/**/coverage.cobertura.xml
            TestResults/merged/Cobertura.xml
            code-coverage-results.md

  jest:
    name: jest (Heimdall.Web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Heimdall.Web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format:check

      - name: Test with coverage
        run: yarn test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jest-coverage
          path: src/Heimdall.Web/coverage/

  pgtap:
    name: pgtap (database)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: heimdall_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pgTAP extension into Postgres service container
        run: |
          docker exec ${{ job.services.postgres.id }} bash -c "
            apt-get update && \
            apt-get install -y --no-install-recommends postgresql-18-pgtap
          "

      - name: Install pg_prove and psql client on runner
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libtap-parser-sourcehandler-pgtap-perl \
            postgresql-client

      - name: Run pgTAP tests
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: heimdall_test
        run: bash tests/pgtap/run-tests.sh

  summary:
    name: summary
    runs-on: ubuntu-latest
    needs: [dotnet, jest, pgtap]
    steps:
      - name: All green
        run: echo "All test suites passed."
