# docker-compose.pgtap.yml
# Convenience compose file for running the pgTAP suite locally without
# polluting the developer's primary Postgres instance. Builds a small
# image extending postgres:17 with the postgresql-17-pgtap extension.
#
# Usage:
#   docker compose -f tests/pgtap/docker-compose.pgtap.yml up -d --build
#   PGPORT=55432 ./tests/pgtap/run-tests.sh
#   docker compose -f tests/pgtap/docker-compose.pgtap.yml down

services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    image: heimdall-pgtap:local
    container_name: heimdall-pgtap
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: heimdall_test
    ports:
      # Mapped to a non-default host port to avoid colliding with the
      # primary docker-compose.yml at the repo root.
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d heimdall_test"]
      interval: 5s
      timeout: 5s
      retries: 10
